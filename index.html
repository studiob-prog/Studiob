                  <div style={{ flex: 1, minWidth: 100 }}>

                    <Badge label={est.label} style={{ background: est.bg, color: est.text }} />

                  <button onClick={() => setModal({ tipo: "concierto", data: c })} style={{ padding: "5px 12px", borderRadius: 6, border: "1.5px solid #E5E7EB", background: "#fff", cursor: "pointer", fontSize: 11 }}>Actualizar</button>

        </div>
      </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 8, marginBottom: 20 }}>
          {[["Este mes", ingresoMensual, "#FF6B35"], ["3 meses", ingresoMensual*3, "#E91E8C"], ["6 meses", ingresoMensual*6, "#7C3AED"], ["12 meses", ingresoMensual*12, "#0EA5E9"]].map(([label, val, color]) => (
            <div key={label} style={{ textAlign: "center", padding: "12px 8px", borderRadius: 10, border: `2px solid ${color}22`, background: color + "08" }}>
              <div style={{ fontSize: 10, color: "#888", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>{label}</div>
              <div style={{ fontSize: 15, fontWeight: 800, color }}>{fmx(val)}</div>

            <span style={{ fontSize: 13, color: "#333" }}>{label}</span>
            <span style={{ fontWeight: 700, fontSize: 13, color, whiteSpace: "nowrap" }}>{fmx(min)} – {fmx(max)}</span>
          </div>

        <div style={{ marginTop: 14, padding: "14px 16px", background: "#1A1A2E", borderRadius: 12, color: "#fff" }}>
          <div style={{ fontSize: 10, color: "#FF6B35", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Potencial total abr – dic 2026</div>
          {[["Clases (9 meses)", fmx(ingresoMensual*9)], ["Recitales solistas", "$117k – $200k"], ["Heathers", "$91k – $182k"], ["Festival Cine", "$10k – $30k"], ["Colegio Harden", "$72k – $135k"]].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, paddingBottom: 6, marginBottom: 6, borderBottom: "1px solid rgba(255,255,255,0.08)" }}>

    {tab === "pasos" && (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17 }}>Lista de Pasos</h2>
          <span style={{ fontSize: 13, fontWeight: 700, color: pctAvance >= 80 ? "#059669" : pctAvance >= 40 ? "#FF6B35" : "#EF4444" }}>{totalHechos}/{pasos.length} · {pctAvance}%</span>

        <div style={{ height: 6, background: "#F0F0F0", borderRadius: 4, overflow: "hidden", marginBottom: 16 }}>

            {items.map(p => (
