<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tablero — Studio B</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F7F6F3;min-height:100vh;padding-bottom:40px}
.header{background:#1A1A2E;padding:22px 20px 16px}
.header-label{color:#FF6B35;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.header-title{color:#fff;font-family:'Playfair Display',serif;font-size:22px;margin-bottom:4px}
.header-sub{color:#8B8FA8;font-size:12px}
.tabs{display:flex;overflow-x:auto;gap:2px;padding:12px 14px 0;background:#F7F6F3;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:8px 8px 0 0;border:none;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:#888;white-space:nowrap;font-family:'Inter',sans-serif}
.tab.active{background:#fff;color:#1A1A2E}
.content{background:#fff;margin:0 14px;border-radius:0 12px 12px 12px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.07)}
.section{display:none}
.section.active{display:block}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.metric{background:#F7F6F3;border-radius:10px;padding:12px 14px}
.metric-val{font-size:18px;font-weight:700;color:#1A1A2E}
.metric-label{font-size:11px;color:#888;margin-top:2px}
.bar-row{margin-bottom:10px}
.bar-row-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.bar-bg{height:6px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.card{border:1.5px solid #E5E7EB;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.btn{padding:5px 11px;border-radius:6px;border:1.5px solid #E5E7EB;background:#fff;cursor:pointer;font-size:11px;font-family:'Inter',sans-serif}
.btn-primary{background:#1A1A2E;color:#fff;border-color:#1A1A2E;font-weight:700}
.btn-purple{background:#7C3AED;color:#fff;border-color:#7C3AED;font-weight:700}
.btn-danger{background:#FEF2F2;color:#EF4444;border-color:#FEE2E2}
.section-title{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.month-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px}
.paso-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;margin-bottom:5px;cursor:pointer;border:1px solid #E5E7EB;background:#F9FAFB}
.paso-item.hecho{background:#F0FDF4;border-color:#BBF7D0}
.paso-text{font-size:13px;color:#1A1A2E;flex:1;line-height:1.4}
.paso-text.hecho{color:#6B7280;text-decoration:line-through}
.urgente{font-size:10px;font-weight:700;color:#EF4444;margin-left:6px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-dot{width:10px;height:10px;border-radius:50%}
.cat-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cat-count{font-size:11px;color:#aaa}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #E5E7EB;background:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;color:#555}
.filter-btn.active{color:#fff}
.progress-bar{height:6px;background:#F0F0F0;border-radius:4px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:#FF6B35;border-radius:4px;transition:width .4s}
.total-bar{padding:12px 14px;background:#F7F6F3;border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.dark-box{padding:14px 16px;background:#1A1A2E;border-radius:12px;color:#fff;margin-top:14px}
.dark-row{display:flex;justify-content:space-between;font-size:13px;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.08)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:22px;width:90%;max-width:420px;max-height:90vh;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:3px;font-size:12px;color:#666;margin-bottom:10px}
.field input,.field select,.field textarea{padding:7px 10px;border:1.5px solid #E5E7EB;border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;outline:none}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:14px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.concierto-calc{background:#F7F6F3;border-radius:10px;padding:12px 14px;font-size:13px;margin-top:10px}
.calc-row{display:flex;justify-content:space-between;margin-bottom:4px;color:#555}
.calc-total{display:flex;justify-content:space-between;font-weight:700;font-size:15px;border-top:1px solid #E5E7EB;padding-top:8px;margin-top:4px}
.urgente-card{display:flex;gap:10px;padding:8px 12px;margin-bottom:6px;background:#FFF9F5;border-radius:8px;align-items:flex-start}
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Estudio de Artes Escenicas</div>
  <div class="header-title">Tablero de Control</div>
  <div class="header-sub">Grupos · Conciertos · Producciones · Proyeccion · Pasos</div>
</div>

<div class="tabs" id="tabs"></div>

<div class="content">
  <div class="section active" id="sec-resumen"></div>
  <div class="section" id="sec-grupos"></div>
  <div class="section" id="sec-producciones"></div>
  <div class="section" id="sec-conciertos"></div>
  <div class="section" id="sec-proyeccion"></div>
  <div class="section" id="sec-pasos"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
const fmx = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n);

const DC = {
  Canto:{bg:'#FF6B35',light:'#FFF0EB',text:'#FF6B35'},
  Teatro:{bg:'#7C3AED',light:'#F3EEFF',text:'#7C3AED'},
  Danza:{bg:'#E91E8C',light:'#FFEEF7',text:'#E91E8C'},
  Cine:{bg:'#0EA5E9',light:'#E8F7FF',text:'#0EA5E9'},
};

const CC = {Conciertos:'#FF6B35',Heathers:'#7C3AED','Festival Cine':'#0EA5E9',Institucional:'#059669',Estudio:'#6B7280'};

const ES = {

  'En ensayos':{bg:'#D1FAE5',text:'#065F46'},
  'Estreno':{bg:'#EDE9FE',text:'#5B21B6'},
};

const ECO = {

  confirmado:{bg:'#DBEAFE',text:'#1E40AF',label:'Confirmado'},
  realizado:{bg:'#D1FAE5',text:'#065F46',label:'Realizado'},
};

let grupos = [
  {id:1,nombre:'Canto Individual CDMX',disciplina:'Canto',alumnos:9,tarifa:1711,dia:'Mar/Jue/Dom',hora:'Varios',modalidad:'Individual',estado:'Activo',detalle:'Diego $1,500 · Jorge $3,000 · Atzin $1,500 · Alexa $1,500 · Jaime $1,500 · Elidey $1,500 · Mariana $1,500 · Karla $1,500 · TanTan $1,400'},
  {id:2,nombre:'Canto Individual Atizapan',disciplina:'Canto',alumnos:4,tarifa:1425,dia:'Mie/Vie',hora:'Varios',modalidad:'Individual',estado:'Activo',detalle:'Angel $1,200 · Ceci $1,500 · Bruno $1,500 · Anahi $1,500'},
  {id:3,nombre:'Canto Grupal CDMX',disciplina:'Canto',alumnos:3,tarifa:667,dia:'Domingo',hora:'11:00',modalidad:'Grupal',estado:'Activo',detalle:'Andres $800 · Alexa $800 · Diego $600'},
  {id:4,nombre:'Canto Grupal Atizapan',disciplina:'Canto',alumnos:5,tarifa:1040,dia:'Domingo',hora:'17:00',modalidad:'Grupal',estado:'Activo',detalle:'Gio $960 · Sophie $960 · Alizee $960 · Damaris $960 · Renee $1,200'},
  {id:5,nombre:'Teatro Musical - Heathers',disciplina:'Teatro',alumnos:5,tarifa:1200,dia:'Domingo',hora:'14:00-17:00',modalidad:'Grupal',estado:'Activo',detalle:'Gio · Sophie · Damaris · Dany · Alizee'},
  {id:8,nombre:'Teatro Musical - Mentiras',disciplina:'Teatro',alumnos:1,tarifa:4000,dia:'Lunes',hora:'20:00-23:00',modalidad:'Grupal',estado:'Activo',detalle:'Grupo activo - cuota fija $4,000/mes'},
  {id:6,nombre:'Cine / Actuacion para Camara',disciplina:'Cine',alumnos:6,tarifa:1200,dia:'Por definir',hora:'Por definir',modalidad:'Grupal',estado:'Activo',detalle:'Omar · Luis · Irlanda · Andres · Pau · Angel'},
  {id:7,nombre:'Actuacion Escenica',disciplina:'Teatro',alumnos:2,tarifa:1200,dia:'Por definir',hora:'Por definir',modalidad:'Individual',estado:'Activo',detalle:'Irlanda · Andres'},
  {id:9,nombre:'Creacion Escenica - Fac. Cine',disciplina:'Teatro',alumnos:6,tarifa:1500,dia:'Lunes',hora:'18:00-20:00',modalidad:'Grupal',estado:'Pausado',detalle:'En apertura · 13 abr - 6 jul 2026 · $3,000 taller / $1,500 mens.'},
  {id:10,nombre:'Coro - Escuela Ford Atizapan',disciplina:'Canto',alumnos:1,tarifa:5400,dia:'Mie y Vie',hora:'08:00-10:00',modalidad:'Institucional',estado:'Activo',detalle:'Contrato escuela primaria Ford'},
  {id:11,nombre:'Colegio Harden CDMX - Canto',disciplina:'Canto',alumnos:0,tarifa:0,dia:'Lun o Mar',hora:'Por confirmar',modalidad:'Institucional',estado:'Pausado',detalle:'Propuesta pendiente'},
  {id:12,nombre:'Colegio Harden CDMX - Actuacion',disciplina:'Teatro',alumnos:0,tarifa:0,dia:'Lun o Mar',hora:'Por confirmar',modalidad:'Institucional',estado:'Pausado',detalle:'Propuesta pendiente'},
];

let producciones = [
  {id:1,nombre:'Festival de Cine + Ensamble B',tipo:'Profesional',etapa:'Fechas confirmadas',fecha:'2026-06-04',presupuesto:20000,captado:0,notas:'4-7 jun. Cortometraje alumnos de cine + Ensamble B'},
  {id:2,nombre:'Heathers - Teatro Musical con Musica en Vivo',tipo:'Profesional',etapa:'En ensayos',fecha:'2026-07-01',presupuesto:29000,captado:0,notas:'Teatro 1,000 personas. Costo $29,000/funcion. Proy: 60% x $200 = $91k neto/funcion.'},
];

let conciertos = [
  {id:1,alumno:'Diego',foro:'Belle Epoque',mes:'Mayo',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:2,alumno:'Mariana',foro:'Belle Epoque',mes:'Mayo',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:3,alumno:'Angel',foro:'Studio B',mes:'Mayo',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:4,alumno:'Ceci',foro:'Studio B',mes:'Mayo',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:5,alumno:'Jorge',foro:'Belle Epoque',mes:'Junio',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:6,alumno:'Karla',foro:'Belle Epoque',mes:'Junio',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:7,alumno:'Bruno',foro:'Studio B',mes:'Junio',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:8,alumno:'Anahi',foro:'Studio B',mes:'Junio',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:9,alumno:'Alexa',foro:'Belle Epoque',mes:'Agosto',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:10,alumno:'Jaime',foro:'Belle Epoque',mes:'Agosto',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:11,alumno:'Elidey',foro:'Studio B',mes:'Septiembre',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:12,alumno:'Atzin',foro:'Studio B',mes:'Septiembre',estado:'pendiente',cuotaCobrada:false,asistentes:0},
  {id:13,alumno:'TanTan',foro:'Belle Epoque',mes:'Octubre',estado:'pendiente',cuotaCobrada:false,asistentes:0},
];

let pasos = [
  {id:1,cat:'Conciertos',texto:'Comunicar programa de recitales a todos los alumnos de canto',hecho:false,pri:'alta'},
  {id:2,cat:'Conciertos',texto:'Cobrar cuota de produccion ($800) a cada alumno antes de su concierto',hecho:false,pri:'alta'},
  {id:3,cat:'Conciertos',texto:'Abrir link de MercadoPago para venta de entradas por concierto',hecho:false,pri:'alta'},
  {id:4,cat:'Conciertos',texto:'Confirmar fechas de Mayo en Belle Epoque (Diego, Mariana)',hecho:false,pri:'alta'},
  {id:5,cat:'Conciertos',texto:'Confirmar fechas de Mayo en Studio B (Angel, Ceci)',hecho:false,pri:'alta'},
  {id:6,cat:'Conciertos',texto:'Definir logistica de video/foto para documentar cada recital',hecho:false,pri:'media'},
  {id:7,cat:'Heathers',texto:'Confirmar fecha exacta de funcion(es) en julio',hecho:false,pri:'alta'},
  {id:8,cat:'Heathers',texto:'Cerrar contrato con el teatro ($14,000/funcion)',hecho:false,pri:'alta'},
  {id:9,cat:'Heathers',texto:'Confirmar y contratar ensamble de musicos ($5,000/funcion)',hecho:false,pri:'alta'},
  {id:10,cat:'Heathers',texto:'Abrir preventa de boletos - iniciar con red de alumnos y familias',hecho:false,pri:'alta'},
  {id:11,cat:'Heathers',texto:'Cerrar vestuario y produccion ($10,000)',hecho:false,pri:'media'},
  {id:12,cat:'Heathers',texto:'Definir precio de boletos y tiers (VIP / general)',hecho:false,pri:'media'},
  {id:13,cat:'Heathers',texto:'Buscar patrocinadores o empresas para bloques de boletos',hecho:false,pri:'media'},
  {id:14,cat:'Festival Cine',texto:'Confirmar programa completo del festival 4-7 junio',hecho:false,pri:'alta'},
  {id:15,cat:'Festival Cine',texto:'Terminar corto con alumnos de cine antes del festival',hecho:false,pri:'alta'},
  {id:16,cat:'Festival Cine',texto:'Definir entrada/cuota del festival y abrir registro',hecho:false,pri:'media'},
  {id:17,cat:'Festival Cine',texto:'Coordinar participacion del Ensamble B',hecho:false,pri:'media'},
  {id:18,cat:'Institucional',texto:'Enviar propuesta formal a Colegio Harden (canto + actuacion)',hecho:false,pri:'alta'},
  {id:19,cat:'Institucional',texto:'Confirmar inscritos del Taller Creacion Escenica - Fac. Cine',hecho:false,pri:'alta'},
  {id:20,cat:'Institucional',texto:'Cobrar inscripciones del Taller Creacion Escenica',hecho:false,pri:'alta'},
  {id:21,cat:'Estudio',texto:'Definir horarios del grupo de Cine / Actuacion para Camara',hecho:false,pri:'media'},
  {id:22,cat:'Estudio',texto:'Definir horarios de Actuacion Escenica (Irlanda, Andres)',hecho:false,pri:'media'},
  {id:23,cat:'Estudio',texto:'Abrir cuenta bancaria exclusiva para el estudio',hecho:false,pri:'alta'},
  {id:24,cat:'Estudio',texto:'Establecer dia fijo de cobro mensual (del 1 al 5)',hecho:false,pri:'alta'},
  {id:25,cat:'Estudio',texto:'Buscar apoyo administrativo (aunque sea medio tiempo)',hecho:false,pri:'media'},
];

let nextId = 50;
let filtroCat = 'Todos';
let activeTab = 'resumen';

// HELPERS
const ingresoMensual = () => grupos.filter(g=>g.estado==='Activo').reduce((s,g)=>s+g.alumnos*g.tarifa,0);
const totalAlumnos = () => grupos.filter(g=>g.estado==='Activo').reduce((s,g)=>s+g.alumnos,0);
const calcConcierto = c => c.asistentes*150 + (c.foro==='Studio B'?c.asistentes*150:0) + (c.cuotaCobrada?800:0);
const ingresoConciertoTotal = () => conciertos.reduce((s,c)=>s+calcConcierto(c),0);
const totalHechos = () => pasos.filter(p=>p.hecho).length;
const pctAvance = () => Math.round(totalHechos()/pasos.length*100);
const badge = (label, bg, text) => `<span class="badge" style="background:${bg};color:${text}">${label}</span>`;

// TABS
const TABS = [{id:'resumen',label:'Resumen'},{id:'grupos',label:'Grupos'},{id:'producciones',label:'Producciones'},{id:'conciertos',label:'Conciertos'},{id:'proyeccion',label:'Proyeccion'},{id:'pasos',label:'Pasos'}];

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map(t =>
    `<button class="tab${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  renderTabs();
  renderSection(id);
}

// MODAL
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });

// RENDER SECTIONS
function renderSection(id) {
  const el = document.getElementById('sec-'+id);
  if(id==='resumen') el.innerHTML = renderResumen();
  if(id==='grupos') el.innerHTML = renderGrupos();
  if(id==='producciones') el.innerHTML = renderProducciones();
  if(id==='conciertos') el.innerHTML = renderConciertos();
  if(id==='proyeccion') el.innerHTML = renderProyeccion();
  if(id==='pasos') el.innerHTML = renderPasos();
}

function renderResumen() {
  const im = ingresoMensual();
  const urgentes = pasos.filter(p=>p.pri==='alta'&&!p.hecho).slice(0,5);
  return `
    <div class="metric-grid">
      ${[['Ingreso mensual',fmx(im),'#FF6B35'],['Alumnos activos',totalAlumnos(),'#7C3AED'],['Recitales progr.',conciertos.length,'#E91E8C'],['Captado recitales',fmx(ingresoConciertoTotal()),'#059669'],['Avance pasos',pctAvance()+'%','#6B7280']].map(([l,v,c])=>
      `<div class="metric" style="border-left:3px solid ${c}"><div class="metric-val">${v}</div><div class="metric-label">${l}</div></div>`).join('')}
    </div>
    <div class="section-title">Por disciplina</div>
    ${['Canto','Teatro','Danza','Cine'].map(disc=>{
      const total = grupos.filter(g=>g.disciplina===disc&&g.estado==='Activo').reduce((s,g)=>s+g.alumnos*g.tarifa,0);
      const pct = im ? Math.round(total/im*100) : 0;
      const col = DC[disc];
      return `<div class="bar-row"><div class="bar-row-top"><span style="color:${col.text};font-weight:700">${disc}</span><span style="color:#555">${fmx(total)} (${pct}%)</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col.bg}"></div></div></div>`;
    }).join('')}
    <div class="section-title" style="margin-top:18px">Pasos urgentes</div>
    ${urgentes.map(p=>`
      <div class="urgente-card" style="border-left:3px solid ${CC[p.cat]||'#888'}">
        <input type="checkbox" ${p.hecho?'checked':''} onchange="togglePaso(${p.id})" style="margin-top:2px;width:15px;height:15px;accent-color:${CC[p.cat]}">
        <div><div style="font-size:10px;color:${CC[p.cat]};font-weight:700;text-transform:uppercase">${p.cat}</div><div style="font-size:13px;color:#333">${p.texto}</div></div>
      </div>`).join('')}
    <button onclick="switchTab('pasos')" style="font-size:12px;color:#FF6B35;background:none;border:none;cursor:pointer;font-weight:700;margin-top:6px">Ver todos los pasos →</button>
  `;
}

function renderGrupos() {
  return `
    <div class="flex-between"><span class="section-title" style="margin:0">Grupos y Clases</span><button class="btn btn-primary" onclick="openGrupoModal()">+ Nuevo</button></div>
    ${grupos.map(g=>{
      const col = DC[g.disciplina]||{bg:'#888',light:'#f5f5f5',text:'#888'};
      return `<div style="border:1.5px solid ${col.bg}33;border-radius:12px;padding:12px 14px;background:${col.light};margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">${badge(g.disciplina,col.bg,'#fff')}<span style="font-size:10px;color:${g.estado==='Activo'?'#059669':'#EF4444'};font-weight:700">● ${g.estado}</span></div>
        <div style="font-weight:700;font-size:14px;color:#1A1A2E">${g.nombre}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${g.dia} ${g.hora} · ${g.modalidad}</div>
        ${g.detalle?`<div style="font-size:11px;color:#aaa;margin-top:3px;line-height:1.5">${g.detalle}</div>`:''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:6px">
          <span style="font-size:11px;color:#888">${g.alumnos} al. × ${fmx(g.tarifa)} = <strong style="color:${col.text}">${fmx(g.alumnos*g.tarifa)}/mes</strong></span>
          <div style="display:flex;gap:5px"><button class="btn" onclick="openGrupoModal(${g.id})">Editar</button><button class="btn btn-danger" onclick="deleteGrupo(${g.id})">X</button></div>
        </div>
      </div>`;
    }).join('')}
    <div class="total-bar"><span style="font-size:13px;color:#555">Total mensual (activos)</span><span style="font-weight:800;font-size:18px;color:#FF6B35">${fmx(ingresoMensual())}</span></div>
  `;
}

function renderProducciones() {
  return `
    <div class="flex-between"><span class="section-title" style="margin:0">Producciones</span><button class="btn btn-purple" onclick="openProdModal()">+ Nueva</button></div>
    ${producciones.map(p=>{
      const pct = p.presupuesto ? Math.round(p.captado/p.presupuesto*100) : 0;
      const est = ES[p.etapa]||{bg:'#eee',text:'#555'};
      return `<div class="card">
        <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">${badge(p.tipo,'#F3F4F6','#374151')} ${badge(p.etapa,est.bg,est.text)}</div>
        <div style="font-weight:700;font-size:14px;color:#1A1A2E">${p.nombre}</div>
        ${p.fecha?`<div style="font-size:11px;color:#888;margin-top:2px">Fecha: ${p.fecha}</div>`:''}
        ${p.notas?`<div style="font-size:11px;color:#6B7280;margin-top:3px;font-style:italic">${p.notas}</div>`:''}
        <div style="margin-top:10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px"><span>Captado: ${fmx(p.captado)} / ${fmx(p.presupuesto)}</span><span style="font-weight:700;color:${pct>=100?'#059669':'#7C3AED'}">${pct}%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${pct>=100?'#059669':'#7C3AED'}"></div></div>
          ${p.captado<p.presupuesto?`<div style="font-size:11px;color:#EF4444;margin-top:3px;font-weight:600">Falta: ${fmx(p.presupuesto-p.captado)}</div>`:''}
        </div>
        <div style="display:flex;gap:5px;margin-top:8px"><button class="btn" onclick="openProdModal(${p.id})">Editar</button><button class="btn btn-danger" onclick="deleteProd(${p.id})">X</button></div>
      </div>`;
    }).join('')}
  `;
}

function renderConciertos() {
  const porMes = conciertos.reduce((a,c)=>{(a[c.mes]=a[c.mes]||[]).push(c);return a},{});
  return `
    <div class="section-title">Recitales Solistas</div>
    <div style="font-size:12px;color:#888;margin-bottom:14px">Cuota $800 · Entrada $150 · Cafeteria Studio B $150/persona</div>
    <div class="metric-grid" style="margin-bottom:16px">
      ${[['Programados',conciertos.length,'#FF6B35'],['Confirmados',conciertos.filter(c=>c.estado==='confirmado').length,'#0EA5E9'],['Realizados',conciertos.filter(c=>c.estado==='realizado').length,'#059669'],['Captado',fmx(ingresoConciertoTotal()),'#7C3AED']].map(([l,v,c])=>
      `<div class="metric" style="border-left:3px solid ${c}"><div class="metric-val">${v}</div><div class="metric-label">${l}</div></div>`).join('')}
    </div>
    ${Object.entries(porMes).map(([mes,lista])=>`
      <div class="month-label">${mes}</div>
      ${lista.map(c=>{
        const est = ECO[c.estado]||ECO.pendiente;
        const total = calcConcierto(c);
        return `<div class="card" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="flex:1;min-width:100px">
            <div style="font-weight:700;font-size:14px;color:#1A1A2E">${c.alumno}</div>
            <div style="font-size:11px;color:#888">${c.foro}${c.asistentes>0?' · '+c.asistentes+' asist.':''}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            ${badge(est.label,est.bg,est.text)}
            ${c.cuotaCobrada?badge('Cuota OK','#D1FAE5','#065F46'):''}
            ${total>0?`<span style="font-weight:700;font-size:13px;color:#059669">${fmx(total)}</span>`:''}
          </div>
          <button class="btn" onclick="openConciertoModal(${c.id})">Actualizar</button>
        </div>`;
      }).join('')}
    `).join('')}
    <div style="padding:12px 14px;background:#F0EDFF;border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <div><div style="font-size:10px;color:#7C3AED;font-weight:700;text-transform:uppercase">Proyeccion 13 recitales</div><div style="font-size:11px;color:#888">60 asist. prom. · 6 noches Studio B</div></div>
      <div style="font-weight:800;font-size:17px;color:#7C3AED">${fmx(13*(60*150+800)+6*60*150)}</div>
    </div>
  `;
}

function renderProyeccion() {
  const im = ingresoMensual();
  return `
    <div class="section-title">Proyeccion Financiera</div>
    <div class="metric-grid" style="margin-bottom:20px">
      ${[['Este mes',im,'#FF6B35'],['3 meses',im*3,'#E91E8C'],['6 meses',im*6,'#7C3AED'],['12 meses',im*12,'#0EA5E9']].map(([l,v,c])=>
      `<div style="text-align:center;padding:12px 8px;border-radius:10px;border:2px solid ${c}22;background:${c}0d">
        <div style="font-size:10px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:4px">${l}</div>
        <div style="font-size:15px;font-weight:800;color:${c}">${fmx(v)}</div>
        <div style="font-size:10px;color:#aaa">solo clases</div>
      </div>`).join('')}
    </div>
    <div class="section-title">Motores adicionales</div>
    ${[['Recitales solistas (13)',117000,200000,'#FF6B35'],['Heathers - 2 funciones',91000,182000,'#7C3AED'],['Festival de Cine',10000,30000,'#0EA5E9'],['Colegio Harden (si cierra)',8000,15000,'#059669']].map(([l,min,max,c])=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#F7F6F3;border-radius:8px;margin-bottom:6px">
      <span style="font-size:13px;color:#333;flex:1">${l}</span>
      <span style="font-weight:700;font-size:12px;color:${c};white-space:nowrap">${fmx(min)} – ${fmx(max)}</span>
    </div>`).join('')}
    <div class="dark-box">
      <div style="font-size:10px;color:#FF6B35;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Potencial total abr – dic 2026</div>
      ${[['Clases (9 meses)',fmx(im*9)],['Recitales solistas','$117k – $200k'],['Heathers','$91k – $182k'],['Festival Cine','$10k – $30k'],['Colegio Harden','$72k – $135k']].map(([k,v])=>
      `<div class="dark-row"><span style="color:#8B8FA8">${k}</span><span style="color:#fff;font-weight:600">${v}</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px">
        <span style="font-size:13px;color:#8B8FA8">Total estimado</span>
        <span style="font-size:20px;font-weight:800;color:#FF6B35">$800k – $1.2M</span>
      </div>
    </div>
  `;
}

function renderPasos() {
  const cats = [...new Set(pasos.map(p=>p.cat))];
  const hechos = totalHechos();
  const pct = pctAvance();
  const filtrados = filtroCat === 'Todos' ? cats : [filtroCat];
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span class="section-title" style="margin:0">Lista de Pasos</span>
      <span style="font-size:13px;font-weight:700;color:${pct>=80?'#059669':pct>=40?'#FF6B35':'#EF4444'}">${hechos}/${pasos.length} · ${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="filter-bar">
      ${['Todos',...cats].map(cat=>`<button class="filter-btn${filtroCat===cat?' active':''}" style="${filtroCat===cat?`background:${CC[cat]||'#1A1A2E'};border-color:${CC[cat]||'#1A1A2E'};color:#fff`:''}" onclick="setCatFiltro('${cat}')">${cat}</button>`).join('')}
    </div>
    ${filtrados.map(cat=>{
      const items = pasos.filter(p=>p.cat===cat);
      const catHechos = items.filter(p=>p.hecho).length;
      return `<div style="margin-bottom:18px">
        <div class="cat-header"><div class="cat-dot" style="background:${CC[cat]||'#888'}"></div><span class="cat-name" style="color:${CC[cat]||'#888'}">${cat}</span><span class="cat-count">${catHechos}/${items.length}</span></div>
        ${items.map(p=>`
          <div class="paso-item${p.hecho?' hecho':''}" onclick="togglePaso(${p.id})">
            <input type="checkbox" ${p.hecho?'checked':''} onchange="togglePaso(${p.id})" onclick="event.stopPropagation()" style="width:15px;height:15px;margin-top:1px;accent-color:${CC[cat]||'#FF6B35'};flex-shrink:0">
            <span class="paso-text${p.hecho?' hecho':''}">${p.texto}${!p.hecho&&p.pri==='alta'?'<span class="urgente">URGENTE</span>':''}</span>
          </div>`).join('')}
      </div>`;
    }).join('')}
  `;
}

// ACTIONS
function togglePaso(id) {
  pasos = pasos.map(p=>p.id===id?{...p,hecho:!p.hecho}:p);
  renderSection('resumen');
  renderSection('pasos');
}

function setCatFiltro(cat) {
  filtroCat = cat;
  renderSection('pasos');
}

function deleteGrupo(id) { grupos = grupos.filter(g=>g.id!==id); renderSection('grupos'); renderSection('resumen'); }
function deleteProd(id) { producciones = producciones.filter(p=>p.id!==id); renderSection('producciones'); }

// GRUPO MODAL
function openGrupoModal(id) {
  const g = id ? grupos.find(x=>x.id===id) : {nombre:'',disciplina:'Canto',alumnos:1,tarifa:1000,dia:'',hora:'',modalidad:'Grupal',estado:'Activo',detalle:''};
  openModal(`
    <div class="modal-title">${id?'Editar grupo':'Nuevo grupo'}</div>
    <div class="field"><label>Nombre</label><input id="g-nombre" value="${g.nombre}"></div>
    <div class="field"><label>Alumnos</label><input id="g-alumnos" type="number" value="${g.alumnos}"></div>
    <div class="field"><label>Tarifa (MXN)</label><input id="g-tarifa" type="number" value="${g.tarifa}"></div>
    <div class="field"><label>Dia</label><input id="g-dia" value="${g.dia}"></div>
    <div class="field"><label>Hora</label><input id="g-hora" value="${g.hora}"></div>
    <div class="field"><label>Detalle / alumnos</label><input id="g-detalle" value="${g.detalle}"></div>
    <div class="field"><label>Disciplina</label><select id="g-disciplina">${['Canto','Teatro','Danza','Cine'].map(o=>`<option${o===g.disciplina?' selected':''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>Estado</label><select id="g-estado">${['Activo','Pausado','Cerrado'].map(o=>`<option${o===g.estado?' selected':''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>Modalidad</label><select id="g-modalidad">${['Individual','Grupal','Institucional'].map(o=>`<option${o===g.modalidad?' selected':''}>${o}</option>`).join('')}</select></div>
    <div class="btn-row"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveGrupo(${id||0})">Guardar</button></div>
  `);
}

function saveGrupo(id) {
  const f = {
    nombre: document.getElementById('g-nombre').value,
    alumnos: +document.getElementById('g-alumnos').value,
    tarifa: +document.getElementById('g-tarifa').value,
    dia: document.getElementById('g-dia').value,
    hora: document.getElementById('g-hora').value,
    detalle: document.getElementById('g-detalle').value,
    disciplina: document.getElementById('g-disciplina').value,
    estado: document.getElementById('g-estado').value,
    modalidad: document.getElementById('g-modalidad').value,
  };
  if(id) grupos = grupos.map(g=>g.id===id?{...g,...f}:g);
  else { grupos.push({...f,id:nextId++}); }
  closeModal(); renderSection('grupos'); renderSection('resumen');
}

// PROD MODAL
function openProdModal(id) {
  const p = id ? producciones.find(x=>x.id===id) : {nombre:'',tipo:'Profesional',etapa:'En planeacion',fecha:'',presupuesto:0,captado:0,notas:''};
  openModal(`
    <div class="modal-title">${id?'Editar produccion':'Nueva produccion'}</div>
    <div class="field"><label>Nombre</label><input id="p-nombre" value="${p.nombre}"></div>
    <div class="field"><label>Fecha</label><input id="p-fecha" type="date" value="${p.fecha}"></div>
    <div class="field"><label>Presupuesto total</label><input id="p-presupuesto" type="number" value="${p.presupuesto}"></div>
    <div class="field"><label>Ya captado</label><input id="p-captado" type="number" value="${p.captado}"></div>
    <div class="field"><label>Notas</label><textarea id="p-notas" rows="2">${p.notas}</textarea></div>

```
<div class="field"><label>Tipo</label><select id="p-tipo">${['Profesional','Infantil','Circo'].map(o=>`<option${o===p.tipo?' selected':''}>${o}</option>`).join('')}</select></div>
<div class="field"><label>Etapa</label><select id="p-etapa">${Object.keys(ES).map(o=>`<option${o===p.etapa?' selected':''}>${o}</option>`).join('')}</select></div>
<div class="btn-row"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-purple" onclick="saveProd(${id||0})">Guardar</button></div>
```

`);
}

function saveProd(id) {
const f = {
nombre: document.getElementById(‘p-nombre’).value,
fecha: document.getElementById(‘p-fecha’).value,
presupuesto: +document.getElementById(‘p-presupuesto’).value,
captado: +document.getElementById(‘p-captado’).value,
notas: document.getElementById(‘p-notas’).value,
tipo: document.getElementById(‘p-tipo’).value,
etapa: document.getElementById(‘p-etapa’).value,
};
if(id) producciones = producciones.map(p=>p.id===id?{…p,…f}:p);
else producciones.push({…f,id:nextId++});
closeModal(); renderSection(‘producciones’);
}

// CONCIERTO MODAL
function openConciertoModal(id) {
const c = conciertos.find(x=>x.id===id);
openModal(` <div class="modal-title">Concierto de ${c.alumno}</div> <div style="font-size:12px;color:#888;margin-bottom:14px">${c.mes} · ${c.foro}</div> <div class="field"><label>Estado</label><select id="c-estado">${Object.keys(ECO).map(o=>`<option value=”${o}”${o===c.estado?’ selected’:’’}>${ECO[o].label}</option>`).join('')}</select></div> <div class="field"><label>Asistentes reales</label><input id="c-asistentes" type="number" value="${c.asistentes}"></div> <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:#555;margin-bottom:12px;cursor:pointer"> <input type="checkbox" id="c-cuota" ${c.cuotaCobrada?'checked':''} style="width:16px;height:16px"> Cuota de produccion cobrada ($800) </label> <div class="concierto-calc" id="c-calc"></div> <div class="btn-row"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveConcierto(${id})">Guardar</button></div> `);
updateCalc(c);
document.getElementById(‘c-asistentes’).addEventListener(‘input’, ()=>updateCalcLive(c.foro));
document.getElementById(‘c-cuota’).addEventListener(‘change’, ()=>updateCalcLive(c.foro));
}

function updateCalc(c) { updateCalcLive(c.foro); }

function updateCalcLive(foro) {
const asist = +(document.getElementById(‘c-asistentes’)||{value:0}).value;
const cuota = (document.getElementById(‘c-cuota’)||{checked:false}).checked;
const entrada = asist*150;
const cafe = foro===‘Studio B’ ? asist*150 : 0;
const cuotaVal = cuota ? 800 : 0;
const total = entrada+cafe+cuotaVal;
const el = document.getElementById(‘c-calc’);
if(el) el.innerHTML = ` <div class="calc-row"><span>Entrada (${asist} x $150)</span><span>${fmx(entrada)}</span></div> ${foro==='Studio B'?`<div class="calc-row"><span>Cafeteria Studio B</span><span>${fmx(cafe)}</span></div>`:''} <div class="calc-row"><span>Cuota produccion</span><span>${fmx(cuotaVal)}</span></div> <div class="calc-total"><span>Total noche</span><span style="color:#059669">${fmx(total)}</span></div> `;
}

function saveConcierto(id) {
const estado = document.getElementById(‘c-estado’).value;
const asistentes = +document.getElementById(‘c-asistentes’).value;
const cuotaCobrada = document.getElementById(‘c-cuota’).checked;
conciertos = conciertos.map(c=>c.id===id?{…c,estado,asistentes,cuotaCobrada}:c);
closeModal(); renderSection(‘conciertos’); renderSection(‘resumen’);
}

// INIT
renderTabs();
renderSection(‘resumen’);
</script>

</body>
</html>
